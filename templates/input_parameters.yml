---
spec:
  inputs:
    docker_image:
      default: "registry.gitlab.com/pl.rachuna-net/containers/python:1.0.0"
      description: "The docker image to use for the job"

---
variables:
  CONTAINER_IMAGE_PYTHON: $[[ inputs.docker_image ]]


include:
  - local: /source/logo.yml
  - local: /source/function_print_row.yml
  - local: /source/parameters_input_variables.yml


.prepare:input_parameters:validate:base:
  image: $CONTAINER_IMAGE_PYTHON
  before_script:
    - git config --global --add safe.directory ${CI_PROJECT_DIR}
    - !reference [.logo]
    - !reference [.prepare:function_print_row]


🔍 Input Parameters:
  stage: prepare
  extends: ['.input_parameters:validate:base']
  script:
    - !reference [.prepare:parameters_input_variables]
  rules:
    - when: never
