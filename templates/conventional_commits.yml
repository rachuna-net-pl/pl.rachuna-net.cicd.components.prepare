---
spec:
  inputs:
    docker_image:
      default: "registry.gitlab.com/pl.rachuna-net/containers/python:1.0.0"
      description: "The docker image to use for the job"
    regexp:
      default: '^(build|chore|ci|docs|params|feat|fix|perf|refactor|style|test|revert|merge|release|hotfix|fixup|squash|wip|BREAKING CHANGE)(\([a-zA-Z0-9_-]+\))?!?:\s.+$'
      description: >
        Commit message musi być zgodny z konwencją Conventional Commits, np.:
        "feat(login): dodano obsługę logowania" lub "fix: poprawiono literówkę".

---
variables:
  CONTAINER_IMAGE_PYTHON: $[[ inputs.docker_image ]]
  CONVENTIONAL_COMMITS_REGEXP: $[[ inputs.regexp ]]


include:
  - local: /source/conventional_commits_input_variables.yml
  - local: /source/logo.yml


.conventional_commits:validate:base:
  image: $CONTAINER_IMAGE_PYTHON
  before_script:
    - git config --global --add safe.directory ${CI_PROJECT_DIR}
    - !reference [.logo]
    - !reference [.function_print_row]
    - !reference [.conventional_commits_input_variables]


🔍 Analyze Conventional Commits:
  stage: prepare
  extends: ['.conventional_commits:validate:base']
  script:
    - |
      echo ""
      echo -e "\033[1;33m===>\033[0m 🔍 Analyze Conventional Commits"
      COMMITS=$(git --no-pager log origin/$CI_DEFAULT_BRANCH..HEAD --pretty=format:"%s")

      IS_ERR="false"

      while IFS= read -r msg; do
        echo "$msg" | grep -Eq "^(Merge|Revert)" && continue
        if ! echo "$msg" | grep -Eq "$CONVENTIONAL_COMMITS_REGEXP"; then
          echo "❌ Niezgodność z Conventional Commits: $msg"
          IS_ERR="true"
        fi
      done <<< "$COMMITS"

      if [[ $IS_ERR == "true" ]]; then
          exit 1
      fi
  allow_failure: true
  rules:
    - when: never
